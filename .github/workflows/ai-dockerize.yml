name: AI Dockerfile Generator

on:
  push:
    branches:
      - main

jobs:
  generate-dockerfile:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3 pyyaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Generate Dockerfile
        env:
          BEDROCK_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
        run: python3 main.py $GITHUB_WORKSPACE

      - name: Show generated Dockerfile
        run: cat Dockerfile.generated

      - name: Upload Dockerfile as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-dockerfile
          path: Dockerfile.generated

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f Dockerfile.generated -t $ECR_REPOSITORY:$IMAGE_TAG .
          echo "ECR_REPOSITORY=$ECR_REPOSITORY" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REPOSITORY }}:latest
          echo "Image pushed: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"